<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>窄巷口网页看板原型</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <p class="brand-kicker">Web Kanban</p>
          <h1>窄巷口经营看板</h1>
          <p class="brand-meta">本地 API 联调版 · 5 个看板骨架</p>
        </div>

        <nav class="nav-list">
          <button class="nav-item is-active" data-view="overview">大盘概览</button>
          <button class="nav-item" data-view="trends">趋势分析</button>
          <button class="nav-item" data-view="stores">门店分析</button>
          <button class="nav-item" data-view="regions">地域分析</button>
          <button class="nav-item" data-view="mappings">门店映射</button>
        </nav>

        <section class="sidebar-panel">
          <p class="panel-label">当前数据范围</p>
          <p id="dataset-range">加载中...</p>
        </section>
      </aside>

      <main class="main-panel">
        <header class="topbar">
          <div>
            <p class="eyebrow">内部经营分析</p>
            <h2 id="view-title">大盘概览</h2>
          </div>
          <div class="topbar-info">
            <span class="status-dot"></span>
            <span id="data-status">等待连接本地 API</span>
          </div>
        </header>

        <section class="filter-bar">
          <div class="filter-stage" id="filter-stage">
            <div class="filter-summary-bar">
              <button type="button" class="filter-summary-pill" id="time-summary-trigger" data-editor="time" aria-expanded="false">
                <span class="filter-summary-label">时间</span>
                <span class="filter-summary-value" id="time-filter-summary">昨日</span>
              </button>

              <button
                type="button"
                class="filter-summary-pill"
                id="platform-summary-trigger"
                data-editor="platform"
                aria-expanded="false"
              >
                <span class="filter-summary-label">平台</span>
                <span class="filter-summary-value" id="platform-filter-summary">全部平台</span>
              </button>

              <button
                type="button"
                class="filter-summary-pill filter-summary-pill--location"
                id="location-summary-trigger"
                data-editor="location"
                aria-expanded="false"
              >
                <span class="filter-summary-label">地区</span>
                <span class="filter-summary-value" id="location-filter-summary">全部省份</span>
              </button>

              <button type="button" class="filter-summary-reset" id="filter-reset-trigger">重置</button>
            </div>

            <div class="filter-editor-stage" id="filter-editor-stage">
              <div class="filter-editor-panel" id="time-editor-panel">
                <div class="time-mode-list">
                  <button type="button" class="time-mode-option is-active" data-range="yesterday">按日</button>
                  <button type="button" class="time-mode-option" data-range="7">近7日</button>
                  <button type="button" class="time-mode-option" data-range="week">按周</button>
                  <button type="button" class="time-mode-option" data-range="month">按月</button>
                  <button type="button" class="time-mode-option" data-range="custom">自定义时间</button>
                </div>

                <div class="time-detail time-detail--week">
                  <label>选择周</label>
                  <input type="week" id="week-date" />
                </div>

                <div class="time-detail time-detail--month">
                  <label>选择月</label>
                  <input type="month" id="month-date" />
                </div>

                <div class="time-detail time-detail--custom">
                  <div class="time-detail-grid">
                    <div>
                      <label>开始日期</label>
                      <input type="date" id="start-date" />
                    </div>
                    <div>
                      <label>结束日期</label>
                      <input type="date" id="end-date" />
                    </div>
                  </div>
                </div>
              </div>

              <div class="filter-editor-panel" id="platform-editor-panel">
                <div class="platform-editor-list">
                  <label class="check-option">
                    <input type="checkbox" id="platform-all-toggle" checked />
                    <span>全部平台</span>
                  </label>
                  <label class="check-option">
                    <input type="checkbox" class="platform-checkbox" value="美团" checked />
                    <span>美团</span>
                  </label>
                  <label class="check-option">
                    <input type="checkbox" class="platform-checkbox" value="饿了么" checked />
                    <span>饿了么</span>
                  </label>
                  <label class="check-option">
                    <input type="checkbox" class="platform-checkbox" value="京东" checked />
                    <span>京东</span>
                  </label>
                </div>
              </div>

              <div class="filter-editor-panel" id="location-editor-panel">
                <div class="location-editor-grid">
                  <div class="time-detail">
                    <label>省份</label>
                    <select id="province-filter">
                      <option value="">全部省份</option>
                    </select>
                  </div>

                  <div class="time-detail">
                    <label>城市</label>
                    <select id="city-filter">
                      <option value="">全部城市</option>
                    </select>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="filter-mapping-shell" id="mapping-filter-shell">
            <div class="filter-secondary-row">
              <div class="filter-group filter-mapping">
                <label>门店搜索</label>
                <input type="search" id="mapping-search" placeholder="搜索门店名称或门店 ID" />
              </div>

              <div class="filter-group filter-mapping">
                <label>映射筛选</label>
                <select id="mapping-filter">
                  <option value="all">全部门店</option>
                  <option value="fully-unmapped">完全未映射</option>
                  <option value="selected-platform-unmapped">当前平台有未映射</option>
                  <option value="selected-platform-fully-mapped">当前平台全部已映射</option>
                </select>
              </div>

              <div class="filter-group filter-mapping filter-mapping-toggle">
                <label>更多筛选</label>
                <button type="button" class="mapping-more-button" id="mapping-more-toggle" aria-expanded="false">
                  <span id="mapping-more-label">展开地域筛选</span>
                </button>
              </div>
            </div>

            <div class="filter-mapping-advanced" id="mapping-advanced-panel">
              <div class="filter-group filter-mapping filter-mapping-advanced-item">
                <label>映射省份</label>
                <select id="mapping-province-filter">
                  <option value="">全部省份</option>
                </select>
              </div>

              <div class="filter-group filter-mapping filter-mapping-advanced-item">
                <label>映射城市</label>
                <select id="mapping-city-filter">
                  <option value="">全部城市</option>
                </select>
              </div>

              <div class="filter-group filter-mapping filter-mapping-advanced-item">
                <label>映射地区</label>
                <select id="mapping-district-filter">
                  <option value="">全部地区</option>
                </select>
              </div>
            </div>
          </div>
        </section>

        <section id="view-overview" class="view-section is-visible"></section>
        <section id="view-trends" class="view-section"></section>
        <section id="view-stores" class="view-section"></section>
        <section id="view-regions" class="view-section"></section>
        <section id="view-mappings" class="view-section"></section>
      </main>
    </div>

    <script src="./app.js" type="module"></script>
  </body>
</html>
